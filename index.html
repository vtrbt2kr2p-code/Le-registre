<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registre — Devis & Factures</title>
<meta name="description" content="Générateur de devis et factures, 100% hors ligne. Vos données restent sur votre appareil.">
<meta name="theme-color" content="#1B2A4A">

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<!-- Génération de PDF (nécessite une connexion la première fois, puis mis en cache par le service worker) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf-autotable.min.js" defer></script>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<!-- Stockage local (IndexedDB) : doit être chargé avant app.js -->
<script src="idb-shim.js"></script>
<script src="app.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(err => {
        console.warn('Service worker non enregistré :', err);
      });
    });
  }
</script>
</body>
</html>
